<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>漢字検索</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- パスワード認証画面 (デフォルトで非表示) -->
    <div class="password-screen hidden" id="passwordScreen">
        <div class="password-box">
            <h1>🔐 アクセス認証</h1>
            <p>アプリを使用するにはパスワードを入力してください</p>
            <div class="password-input-group">
                <input type="password" id="passwordInput" placeholder="パスワード" autofocus>
            </div>
            <button class="password-button" onclick="authManager.checkPassword()">アクセス</button>
            <div class="password-error" id="passwordError"></div>
        </div>
    </div>

    <!-- メイン画面 (デフォルトで表示) -->
    <div class="main-screen" id="mainScreen">
        <div class="container">
            <!-- ヘッダー -->
            <div class="header">
                <h1>🔍 漢字検索</h1>
                <p>漢字または読み仮名で番号を検索</p>
                <div class="header-buttons">
                    <a href="data_input_tool.html" class="header-btn">📝 データ編集</a>
                    <button class="header-btn" onclick="authManager.logout()" style="background: rgba(255, 255, 255, 0.2); cursor: pointer;">🚪 ログアウト</button>
                </div>
            </div>

            <!-- コンテンツエリア -->
            <div class="content">
                <!-- ファイルセクション -->
                <div class="file-section">
                    <div class="file-input-wrapper">
                        <label class="file-input-label" for="csvFile">
                            📁 CSVファイルを選択
                        </label>
                        <input type="file" id="csvFile" accept=".csv">
                    </div>
                    <div class="file-status" id="fileStatus"></div>
                    <div class="file-list" id="fileList"></div>
                    <div class="button-row">
                        <button class="btn-primary" onclick="document.getElementById('csvFile').click()">+ 追加</button>
                        <button class="btn-secondary" onclick="app.clearAllFiles()">全削除</button>
                    </div>
                </div>

                <!-- 検索セクション -->
                <div class="search-section">
                    <label for="searchInput">検索</label>
                    <div class="search-input-wrapper">
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="漢字または読み仮名"
                            disabled
                        >
                        <button class="search-clear-btn" onclick="app.clearSearch()">✕</button>
                    </div>
                </div>

                <!-- 検索結果セクション -->
                <div class="results-section" id="resultsSection" tabindex="-1">
                    <div class="empty-state">ファイルを選択してください</div>
                </div>

                <!-- 統計情報 -->
                <div class="stats" id="stats"></div>
            </div>
        </div>
    </div>

    <!-- 認証スクリプト -->
    <script src="auth.js"></script>
    <!-- メインアプリケーション -->
    <script src="app.js"></script>
    <!-- 認証マネージャー初期化 -->
    <script>
        // パスワードのハッシュ（ビルド時に環境変数から埋め込まれます）
        const PASSWORD_HASH = "___PASSWORD_HASH_PLACEHOLDER___";

        // 認証マネージャーを初期化
        const authManager = new AuthManager(PASSWORD_HASH);
    </script>
</body>
</html>
