name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build with environment variable
        env:
          PASSWORD_HASH: ${{ secrets.PASSWORD_HASH }}
        run: |
          node build.js

      - name: Verify build
        run: |
          if grep -q "___PASSWORD_HASH_PLACEHOLDER___" index.html; then
            echo "❌ Error: Placeholder not replaced"
            exit 1
          fi
          echo "✅ Build verification passed"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
